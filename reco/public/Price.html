<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sell Your Recyclable Waste | Revive Ecotech</title>
  <style>
    :root {
      --green-dark: #2e7d32;
      --green-light: #e8f5e9;
      --background: #ffffff;
      --text: #1a1a1a;
      --border: #dfe3e8;
      --input-bg: #ffffff;
    }

    body.dark-mode {
      --background: #121212;
      --text: #e0e0e0;
      --green-light: #1e1e1e;
      --border: #333;
      --input-bg: #222;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--background);
      color: var(--text);
      transition: background-color 0.3s ease, color 0.3s ease;
      padding: 40px 20px;
    }

    .container {
      max-width: 960px;
      margin: auto;
      background-color: var(--green-light);
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .header h1 {
      font-size: 2.5rem;
      font-weight: 600;
      color: var(--green-dark);
      margin-bottom: 10px;
    }

    .header p {
      color: #666;
      max-width: 600px;
      margin: auto;
      font-size: 1rem;
    }

    .toggle-mode {
      display: block;
      margin: 0 auto 30px;
      padding: 10px 24px;
      font-size: 1rem;
      background-color: var(--green-dark);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    .toggle-mode:hover {
      background-color: #256029;
    }

    .material-list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
      margin-top: 30px;
    }

    .material-item {
      background-color: var(--input-bg);
      padding: 20px;
      border: 1px solid var(--border);
      border-radius: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }

    .material-name {
      font-weight: 600;
      color: var(--green-dark);
      flex: 1;
      min-width: 120px;
    }

    .material-price {
      width: 80px;
      text-align: right;
      color: #555;
    }

    .quantity-input input {
      width: 100px;
      padding: 8px;
      font-size: 1rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background-color: var(--input-bg);
      color: var(--text);
    }

    .total-section {
      text-align: right;
      margin-top: 40px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    .total-amount {
      font-size: 1.5rem;
      font-weight: bold;
      color: var(--green-dark);
      margin: 10px 0;
    }

    .btn {
      background-color: var(--green-dark);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    .btn:hover {
      background-color: #256029;
    }

    @media (max-width: 600px) {
      .material-item {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
      }

      .material-price,
      .quantity-input input {
        width: 100%;
      }

      .total-section {
        text-align: center;
      }
    }
  </style>
</head>

<body>

  <button class="toggle-mode" onclick="toggleDarkMode()">Toggle Dark Mode</button>

  <div class="container">
    <section class="header">
      <h1>Sell Your Recyclable Waste</h1>
      <p>Choose the materials you have at home. We'll pick them up and pay you accordingly.</p>
    </section>

    <div class="material-list">
      <div class="material-item">
        <div class="material-name">Plastic</div>
        <div class="material-price">₹10/kg</div>
        <div class="quantity-input"><input type="number" min="0" step="0.1" class="quantity" data-price="10" placeholder="Qty (kg)"></div>
      </div>

      <div class="material-item">
        <div class="material-name">Glass</div>
        <div class="material-price">₹8/kg</div>
        <div class="quantity-input"><input type="number" min="0" step="0.1" class="quantity" data-price="8" placeholder="Qty (kg)"></div>
      </div>

      <div class="material-item">
        <div class="material-name">Papers</div>
        <div class="material-price">₹5/kg</div>
        <div class="quantity-input"><input type="number" min="0" step="0.1" class="quantity" data-price="5" placeholder="Qty (kg)"></div>
      </div>

      <div class="material-item">
        <div class="material-name">E-waste</div>
        <div class="material-price">₹20/kg</div>
        <div class="quantity-input"><input type="number" min="0" step="0.1" class="quantity" data-price="20" placeholder="Qty (kg)"></div>
      </div>

      <div class="material-item">
        <div class="material-name">Aluminum</div>
        <div class="material-price">₹12/kg</div>
        <div class="quantity-input"><input type="number" min="0" step="0.1" class="quantity" data-price="12" placeholder="Qty (kg)"></div>
      </div>

      <div class="material-item">
        <div class="material-name">Iron</div>
        <div class="material-price">₹10/kg</div>
        <div class="quantity-input"><input type="number" min="0" step="0.1" class="quantity" data-price="10" placeholder="Qty (kg)"></div>
      </div>
    </div>

    <div class="total-section">
      <h3>Total Amount</h3>
      <div class="total-amount" id="total-amount">₹0.00</div>
      <button class="btn" id="calculate-btn">Get Price Estimate</button>
    </div>
  </div>

  <script>
    function updateTotal() {
      const inputs = document.querySelectorAll('.quantity');
      let total = 0;

      inputs.forEach(input => {
        const qty = parseFloat(input.value) || 0;
        const rate = parseFloat(input.dataset.price);
        total += qty * rate;
      });

      document.getElementById('total-amount').textContent = `₹${total.toFixed(2)}`;
    }

    function toggleDarkMode() {
      document.body.classList.toggle('dark-mode');
    }

    document.addEventListener('DOMContentLoaded', () => {
      const inputs = document.querySelectorAll('.quantity');
      inputs.forEach(input => input.addEventListener('input', updateTotal));
      document.getElementById('calculate-btn').addEventListener('click', updateTotal);
    });
  </script>

</body>

</html>
